<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ・パートナー募集 | 中小企業の伴走者</title>
    <link rel="icon" href="https://spc-jp.github.io/mikke-catalog-contact/favicon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#1e40af', secondary: '#3b82f6', accent: '#f59e0b' },
                    fontFamily: { sans: ['"Noto Sans JP"', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Noto Sans JP', sans-serif; } .hero-pattern { background-color: #f0f9ff; background-image: radial-gradient(#bae6fd 1px, transparent 1px); background-size: 20px 20px; }</style>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="#" class="flex items-center">
                <img src="./SPC考えるをひとりにしない.png" alt="SPC" class="h-10 md:h-12 w-auto" onerror="this.src='https://placehold.co/400x100/1e40af/FFFFFF?text=SPC';">
            </a>
            <a href="#contact" class="bg-primary text-white px-5 py-2 rounded-full font-medium hover:bg-blue-900 transition">お問い合わせ</a>
        </div>
    </header>

    <!-- Hero -->
    <section class="hero-pattern py-16 md:py-24 border-b border-blue-100">
        <div class="max-w-6xl mx-auto px-4 text-center">
            <h1 class="text-3xl md:text-5xl font-bold text-gray-900 mb-6 leading-tight">
                “考えるを、<span class="text-primary border-b-4 border-accent">ひとりにしない</span>”
            </h1>
            <p class="text-lg md:text-xl text-gray-600 mb-8 max-w-3xl mx-auto leading-relaxed">
                中小企業の現場に寄り添って30年以上。経営者の「困った」を解決し続けます。
            </p>
            <div class="flex justify-center gap-4">
                <a href="#contact" class="bg-primary text-white px-8 py-3 rounded-full font-bold hover:bg-blue-900 transition shadow-md">相談する</a>
            </div>
        </div>
    </section>

    <!-- Contact Form -->
    <section id="contact" class="py-16 bg-white flex-grow">
        <div class="max-w-3xl mx-auto px-4">
            <div class="text-center mb-10">
                <h2 class="text-3xl font-bold text-gray-900 mb-4">お問い合わせ</h2>
                <p class="text-gray-600">パートナーシップやアプリ利用のご相談はこちらから。</p>
            </div>

            <form id="contactForm" class="space-y-6 bg-gray-50 p-8 rounded-2xl shadow-sm border border-gray-100">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-3">お問い合わせ種別 <span class="text-red-500">*</span></label>
                    <div class="space-y-2 sm:space-y-0 sm:flex sm:space-x-4">
                        <label class="flex items-center cursor-pointer p-3 border rounded-lg bg-white hover:bg-blue-50 transition flex-1">
                            <input type="radio" name="inquiry_type" value="partner" class="w-4 h-4 text-primary" checked>
                            <span class="ml-2 text-sm text-gray-700 font-medium">パートナーシップについて</span>
                        </label>
                        <label class="flex items-center cursor-pointer p-3 border rounded-lg bg-white hover:bg-blue-50 transition flex-1">
                            <input type="radio" name="inquiry_type" value="app" class="w-4 h-4 text-primary">
                            <span class="ml-2 text-sm text-gray-700 font-medium">アプリの利用について</span>
                        </label>
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">会社名</label>
                        <input type="text" name="company" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-primary transition">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">お名前 <span class="text-red-500">*</span></label>
                        <input type="text" name="name" required class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-primary transition">
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">メールアドレス <span class="text-red-500">*</span></label>
                        <input type="email" name="email" required class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-primary transition">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">電話番号</label>
                        <input type="tel" name="phone" class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-primary transition">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">内容 <span class="text-red-500">*</span></label>
                    <textarea name="message" rows="5" required class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-primary resize-none transition"></textarea>
                </div>

                <div class="flex items-start">
                    <input id="privacy" type="checkbox" required class="mt-1 w-4 h-4 text-primary rounded cursor-pointer">
                    <label for="privacy" class="ml-3 text-sm text-gray-600 cursor-pointer">個人情報の取り扱いに同意する</label>
                </div>

                <div class="pt-2 text-center">
                    <button type="submit" class="w-full sm:w-auto px-10 py-3 bg-primary text-white font-bold rounded-full hover:bg-blue-900 transition shadow-md">
                        <i class="fa-regular fa-paper-plane mr-2"></i>送信する
                    </button>
                </div>
            </form>

            <div id="successMessage" class="hidden mt-8 p-8 bg-green-50 border border-green-200 rounded-xl text-center">
                <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4 text-green-600">
                    <i class="fa-solid fa-check text-3xl"></i>
                </div>
                <h3 class="text-xl font-bold text-green-800 mb-2">送信が完了しました</h3>
                <p class="text-green-700">内容を確認次第、担当者より折り返しご連絡させていただきます。</p>
                <button onclick="location.reload()" class="mt-6 px-6 py-2 bg-white border border-green-300 text-green-700 rounded-full hover:bg-green-50 transition text-sm font-bold">戻る</button>
            </div>
        </div>
    </section>

    <footer class="bg-gray-900 text-white py-12 text-center">
        <p class="text-gray-400 text-sm">&copy; 2024 Smile Plus Consulting. All rights reserved.</p>
    </footer>

    <script>
        const form = document.getElementById('contactForm');
        const successMessage = document.getElementById('successMessage');
        const submitButton = form.querySelector('button[type="submit"]');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            const originalButtonText = submitButton.innerHTML;
            submitButton.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>送信中...';
            submitButton.disabled = true;

            try {
                // WorkersのURL
                const endpointUrl = 'https://mikke-catalog-contact.yymmatsu.workers.dev';
                const formData = new FormData(form);
                const data = Object.fromEntries(formData.entries());

                const response = await fetch(endpointUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();

                if (!response.ok) {
                    // エラーメッセージがある場合はそれを表示
                    throw new Error(result.error || `エラーコード: ${response.status}`);
                }

                form.style.display = 'none';
                successMessage.classList.remove('hidden');
                successMessage.scrollIntoView({ behavior: 'smooth', block: 'center' });

            } catch (error) {
                alert(`【送信エラー】\n\n${error.message}\n\n※500エラーが出る場合は、Cloudflare側の「RESEND_API_KEY」の設定と、Resendの送信先制限を確認してください。`);
            } finally {
                submitButton.innerHTML = originalButtonText;
                submitButton.disabled = false;
            }
        });
    </script>
</body>
</html>
